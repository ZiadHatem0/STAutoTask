name: Automated Tests

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 15 * * 4'  # Thursday 3 PM

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Connect to Outline VPN
        run: |
          sudo apt-get install -y shadowsocks-libev 2>/dev/null
          python3 - "${{ secrets.OUTLINE_ACCESS_KEY }}" <<'EOF'
          import sys, base64, re, json

          key = sys.argv[1].split('?')[0]
          body = key[5:]

          m = re.match(r'([A-Za-z0-9+/=_-]+)@([^:]+):(\d+)$', body)
          if m:
              userinfo_b64, host, port = m.groups()
              padding = 4 - len(userinfo_b64) % 4
              userinfo = base64.urlsafe_b64decode(userinfo_b64 + '=' * padding).decode()
              method, password = userinfo.split(':', 1)
          else:
              padding = 4 - len(body) % 4
              decoded = base64.urlsafe_b64decode(body + '=' * padding).decode()
              m2 = re.match(r'([^:]+):(.+)@([^:]+):(\d+)$', decoded)
              method, password, host, port = m2.groups()

          cfg = {"server": host, "server_port": int(port),
                 "local_address": "127.0.0.1", "local_port": 1080,
                 "password": password, "method": method, "timeout": 60}
          with open('/tmp/ss.json', 'w') as f:
              json.dump(cfg, f)
          print(f"Parsed: {method} @ {host}:{port}")
          EOF
          ss-local -c /tmp/ss.json -u &
          sleep 3
          echo "SOCKS5 proxy running on 127.0.0.1:1080"

      - name: Verify connectivity through VPN
        run: curl --socks5 127.0.0.1:1080 --max-time 30 -o /dev/null -w "HTTP status: %{http_code}\n" "https://storefront-consumer-frontend-store-front-dev.skynodes.dev/"

      - name: Run Maven tests
        env:
          USE_PROXY: "true"
        run: mvn test "-Dtestng.suites=testNG.xml"

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: 'target/surefire-reports/'
          reporter: 'java-junit'
